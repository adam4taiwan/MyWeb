<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  html { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#111; }
  .scale-wrapper { transform-origin: center center; }
</style>
<script>
  window.addEventListener("load", function() {
    var s = Math.min(window.innerWidth/1080, window.innerHeight/1080);
    document.querySelector("body").style.transform = "scale(" + s + ")";
    document.querySelector("body").style.transformOrigin = "top left";
    document.querySelector("html").style.display = "flex";
    document.querySelector("html").style.justifyContent = "center";
    document.querySelector("html").style.alignItems = "center";
    document.querySelector("html").style.minHeight = "100vh";
    document.querySelector("html").style.background = "#111";
  });
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #1a1008 0%, #2d1e0a 40%, #1a1008 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
    overflow: hidden;
    position: relative;
  }

  .card {
    width: 940px;
    padding: 50px 70px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-size: 42px;
    color: #D4A574;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .title-sub {
    font-size: 22px;
    color: #8a7055;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .stars-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 36px;
  }

  .star-item {
    background: rgba(212,165,116,0.07);
    border: 1px solid rgba(212,165,116,0.18);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .star-name {
    font-size: 26px;
    color: #D4A574;
    font-weight: 500;
    white-space: nowrap;
    min-width: 80px;
  }

  .star-desc {
    font-size: 22px;
    color: #c4a882;
    line-height: 1.5;
    padding-top: 2px;
  }

  .cta-box {
    background: rgba(212,165,116,0.1);
    border: 1px solid rgba(212,165,116,0.3);
    border-radius: 12px;
    padding: 24px 30px;
    text-align: center;
    font-size: 24px;
    color: #f5ead8;
    line-height: 1.7;
  }

  .cta-box em {
    font-style: normal;
    color: #D4A574;
  }

  .bottom-logo {
    position: absolute;
    bottom: 36px;
    right: 70px;
    font-size: 20px;
    color: rgba(212,165,116,0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">你的命宮主星是哪一顆？</div>
    <div class="title-sub">十四主星・各有天命</div>

    <div class="stars-grid">
      <div class="star-item">
        <div class="star-name">紫微星</div>
        <div class="star-desc">天生領導者，凡事掌主控</div>
      </div>
      <div class="star-item">
        <div class="star-name">天機星</div>
        <div class="star-desc">思維靈活，點子源源不絕</div>
      </div>
      <div class="star-item">
        <div class="star-name">太陽星</div>
        <div class="star-desc">熱情付出，樂於助人</div>
      </div>
      <div class="star-item">
        <div class="star-name">武曲星</div>
        <div class="star-desc">行動力強，對財敏銳</div>
      </div>
      <div class="star-item">
        <div class="star-name">天同星</div>
        <div class="star-desc">與世無爭，天生享福</div>
      </div>
      <div class="star-item">
        <div class="star-name">廉貞星</div>
        <div class="star-desc">才藝豐富，感情細膩</div>
      </div>
      <div class="star-item">
        <div class="star-name">天府星</div>
        <div class="star-desc">穩重踏實，善於理財</div>
      </div>
      <div class="star-item">
        <div class="star-name">破軍星</div>
        <div class="star-desc">改革先鋒，不安現狀</div>
      </div>
    </div>

    <div class="cta-box">
      留言告訴我你的<em>出生年月</em>，我來說說你的命宮主星
    </div>
  </div>

  <div class="bottom-logo">玉洞子星相古學堂 ・ yudongzi.tw</div>
</body>
</html>
