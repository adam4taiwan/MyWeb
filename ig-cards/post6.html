<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  html { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#111; }
</style>
<script>
  window.addEventListener("load", function() {
    var s = Math.min(window.innerWidth/1080, window.innerHeight/1080);
    document.querySelector("body").style.transform = "scale(" + s + ")";
    document.querySelector("body").style.transformOrigin = "top left";
  });
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #1a1008 0%, #2d1e0a 40%, #1a1008 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
    overflow: hidden;
    position: relative;
  }

  .bg-circle {
    position: absolute;
    width: 650px; height: 650px;
    border-radius: 50%;
    border: 1px solid rgba(212,165,116,0.07);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .card {
    width: 880px;
    padding: 60px 80px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .question {
    font-size: 44px;
    color: #f5ead8;
    line-height: 1.7;
    margin-bottom: 44px;
    font-weight: 400;
  }

  .question em { color: #D4A574; font-style: normal; }

  .divider {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4A574, transparent);
    margin: 0 auto 44px;
  }

  .answer-label {
    font-size: 24px;
    color: #D4A574;
    letter-spacing: 4px;
    margin-bottom: 30px;
  }

  .timeline {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 44px;
    text-align: left;
  }

  .tl-item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 18px 28px;
    background: rgba(212,165,116,0.07);
    border: 1px solid rgba(212,165,116,0.15);
    border-radius: 12px;
  }

  .tl-age {
    font-size: 26px;
    color: #D4A574;
    font-weight: 500;
    min-width: 130px;
  }

  .tl-text {
    font-size: 24px;
    color: #c4a882;
  }

  .tl-text span { color: #f5ead8; }

  .conclusion {
    font-size: 28px;
    color: #f5ead8;
    line-height: 1.8;
  }

  .conclusion em { color: #D4A574; font-style: normal; }

  .bottom-logo {
    position: absolute;
    bottom: 44px;
    right: 80px;
    font-size: 20px;
    color: rgba(212,165,116,0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="bg-circle"></div>

  <div class="card">
    <div class="question">
      為什麼有人<em>30歲前</em>很辛苦<br>
      <em>40歲後</em>卻一飛沖天？
    </div>

    <div class="divider"></div>

    <div class="answer-label">答案在「大限」</div>

    <div class="timeline">
      <div class="tl-item">
        <div class="tl-age">20–30歲</div>
        <div class="tl-text">有人黃金期在此，<span>輕鬆起飛</span></div>
      </div>
      <div class="tl-item">
        <div class="tl-age">40–50歲</div>
        <div class="tl-text">有人此時才<span>真正爆發</span></div>
      </div>
      <div class="tl-item">
        <div class="tl-age">60歲之後</div>
        <div class="tl-text">大器晚成，<span>越老越旺</span></div>
      </div>
    </div>

    <div class="conclusion">
      不是你不夠努力<br>
      而是還沒走到你的<em>黃金大限</em>
    </div>
  </div>

  <div class="bottom-logo">玉洞子星相古學堂 ・ yudongzi.tw</div>
</body>
</html>
