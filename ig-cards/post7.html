<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  html { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#111; }
</style>
<script>
  window.addEventListener("load", function() {
    var s = Math.min(window.innerWidth/1080, window.innerHeight/1080);
    document.querySelector("body").style.transform = "scale(" + s + ")";
    document.querySelector("body").style.transformOrigin = "top left";
  });
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #1a1008 0%, #2d1e0a 40%, #1a1008 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
    overflow: hidden;
    position: relative;
  }

  .card {
    width: 940px;
    padding: 50px 70px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .label {
    font-size: 22px;
    color: #8a7055;
    letter-spacing: 5px;
    margin-bottom: 16px;
  }

  .title {
    font-size: 48px;
    color: #D4A574;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .subtitle {
    font-size: 24px;
    color: #8a7055;
    margin-bottom: 40px;
  }

  .stems-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }

  .stem-item {
    background: rgba(212,165,116,0.07);
    border: 1px solid rgba(212,165,116,0.18);
    border-radius: 12px;
    padding: 20px 12px;
    text-align: center;
  }

  .stem-name {
    font-size: 30px;
    color: #D4A574;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .stem-element {
    font-size: 20px;
    color: #8a7055;
    margin-bottom: 10px;
  }

  .stem-traits {
    font-size: 19px;
    color: #c4a882;
    line-height: 1.6;
  }

  .divider {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4A574, transparent);
    margin: 0 auto 28px;
  }

  .cta {
    font-size: 26px;
    color: #f5ead8;
    background: rgba(212,165,116,0.1);
    border: 1px solid rgba(212,165,116,0.3);
    border-radius: 12px;
    padding: 22px 30px;
    line-height: 1.7;
  }

  .cta em { color: #D4A574; font-style: normal; }

  .bottom-logo {
    position: absolute;
    bottom: 40px;
    right: 70px;
    font-size: 20px;
    color: rgba(212,165,116,0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label">八 字 核 心</div>
    <div class="title">你的日主是哪個天干？</div>
    <div class="subtitle">日主，代表你這個人的能量屬性</div>

    <div class="stems-grid">
      <div class="stem-item">
        <div class="stem-name">甲乙</div>
        <div class="stem-element">木</div>
        <div class="stem-traits">仁慈<br>有創意<br>重情義</div>
      </div>
      <div class="stem-item">
        <div class="stem-name">丙丁</div>
        <div class="stem-element">火</div>
        <div class="stem-traits">熱情<br>外向<br>有表現慾</div>
      </div>
      <div class="stem-item">
        <div class="stem-name">戊己</div>
        <div class="stem-element">土</div>
        <div class="stem-traits">穩重<br>包容<br>重實際</div>
      </div>
      <div class="stem-item">
        <div class="stem-name">庚辛</div>
        <div class="stem-element">金</div>
        <div class="stem-traits">果斷<br>有原則<br>重效率</div>
      </div>
      <div class="stem-item">
        <div class="stem-name">壬癸</div>
        <div class="stem-element">水</div>
        <div class="stem-traits">聰明<br>靈活<br>善思考</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="cta">
      留言你的<em>生日</em>，我告訴你你的日主 👇
    </div>
  </div>

  <div class="bottom-logo">玉洞子星相古學堂 ・ yudongzi.tw</div>
</body>
</html>
