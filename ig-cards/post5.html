<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  html { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#111; }
</style>
<script>
  window.addEventListener("load", function() {
    var s = Math.min(window.innerWidth/1080, window.innerHeight/1080);
    document.querySelector("body").style.transform = "scale(" + s + ")";
    document.querySelector("body").style.transformOrigin = "top left";
  });
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #1a1008 0%, #2d1e0a 40%, #1a1008 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
    overflow: hidden;
    position: relative;
  }

  .card {
    width: 920px;
    padding: 60px 80px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .label {
    font-size: 22px;
    color: #8a7055;
    letter-spacing: 6px;
    margin-bottom: 20px;
  }

  .title {
    font-size: 50px;
    color: #f5ead8;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .title em {
    color: #D4A574;
    font-style: normal;
  }

  .subtitle {
    font-size: 26px;
    color: #8a7055;
    margin-bottom: 44px;
    letter-spacing: 2px;
  }

  .four-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  .item {
    background: rgba(212,165,116,0.07);
    border: 1px solid rgba(212,165,116,0.2);
    border-radius: 14px;
    padding: 26px 28px;
    text-align: left;
  }

  .item-title {
    font-size: 32px;
    color: #D4A574;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .item-arrow {
    font-size: 22px;
    color: #c4a882;
    line-height: 1.6;
  }

  .item-arrow span { color: #f5ead8; }

  .cta {
    font-size: 26px;
    color: #f5ead8;
    background: rgba(212,165,116,0.1);
    border: 1px solid rgba(212,165,116,0.3);
    border-radius: 12px;
    padding: 22px 30px;
    line-height: 1.7;
  }

  .cta em { color: #D4A574; font-style: normal; }

  .bottom-logo {
    position: absolute;
    bottom: 44px;
    right: 80px;
    font-size: 20px;
    color: rgba(212,165,116,0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label">學 命 理 必 懂</div>
    <div class="title">紫微斗數・<em>四化</em></div>
    <div class="subtitle">決定你今年運勢走向的四個關鍵字</div>

    <div class="four-grid">
      <div class="item">
        <div class="item-title">化祿</div>
        <div class="item-arrow">→ <span>財運、機緣、順遂</span></div>
      </div>
      <div class="item">
        <div class="item-title">化權</div>
        <div class="item-arrow">→ <span>權力、主導、競爭</span></div>
      </div>
      <div class="item">
        <div class="item-title">化科</div>
        <div class="item-arrow">→ <span>名聲、考試、貴人</span></div>
      </div>
      <div class="item">
        <div class="item-title">化忌</div>
        <div class="item-arrow">→ <span>阻礙、執念、消耗</span></div>
      </div>
    </div>

    <div class="cta">
      四化飛入哪個宮位，那個宮位就受影響<br>
      留言你的<em>出生年</em>，我告訴你今年化忌在哪 👇
    </div>
  </div>

  <div class="bottom-logo">玉洞子星相古學堂 ・ yudongzi.tw</div>
</body>
</html>
